<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Graph Trainer</title>
  <style>
    body {
      margin: 0;
      padding: 14px;
      width: 320px;
      font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #102033;
      background: #f7fbff;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 16px;
    }
    p {
      margin: 0 0 12px;
      color: #4c5c6c;
    }
    label {
      display: block;
      margin: 10px 0 6px;
      font-weight: 600;
    }
    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border: 1px solid #c7d7e6;
      border-radius: 10px;
      background: #fff;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    button {
      margin-top: 12px;
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      background: #0f5f8c;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    #status {
      margin-top: 10px;
      color: #1b6b4b;
      min-height: 18px;
    }
    code {
      font-family: Consolas, monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>Graph Trainer</h1>
  <p>Enable the trainer on any page and point it to your running Graph backend.</p>

  <div class="row">
    <input id="enabled" type="checkbox">
    <label for="enabled" style="margin: 0; font-weight: 600;">Enable on pages</label>
  </div>

  <label for="backendUrl">Backend URL</label>
  <input id="backendUrl" type="text" placeholder="https://graph-1-hap6.onrender.com">

  <button id="save">Save</button>
  <div id="status"></div>

  <p>After saving, reload the target tab. The trainer will mount automatically.</p>

  <script src="popup.js"></script>
</body>
</html>
