<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmacion de reserva | Rent a Car Medellin</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./assets/bootstrap.min.css">
  <link rel="stylesheet" href="./assets/font-awesome.min.css">
  <style>
    :root {
      --brand-red: #d51717;
      --brand-dark: #12253e;
      --brand-green: #8bc53f;
      --text-main: #1f2f46;
      --text-soft: #5d6c80;
      --surface: #ffffff;
      --line: rgba(18, 37, 62, 0.1);
      --shadow: 0 24px 50px rgba(15, 23, 42, 0.12);
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Quicksand, "Segoe UI", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at top left, rgba(213, 23, 23, 0.16), transparent 28%),
        linear-gradient(180deg, #f6f4f2 0%, #ffffff 100%);
    }
    .site-navbar {
      background: #000;
      border-bottom: 4px solid var(--brand-red);
      padding: 18px 0;
    }
    .site-navbar img {
      max-width: 200px;
      height: auto;
    }
    .confirmation-shell {
      max-width: 840px;
      margin: 0 auto;
      padding: 40px 16px 64px;
    }
    .confirmation-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 42px 28px;
      text-align: center;
    }
    .confirmation-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 86px;
      height: 86px;
      margin-bottom: 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, #d51717, #ff5757);
      color: #fff;
      box-shadow: 0 18px 36px rgba(213, 23, 23, 0.22);
    }
    .confirmation-badge svg {
      width: 42px;
      height: 42px;
    }
    .confirmation-card h1 {
      margin: 0;
      color: var(--brand-dark);
      font-size: clamp(2.4rem, 5vw, 3.5rem);
      font-weight: 800;
      line-height: 1;
    }
    .confirmation-lead {
      max-width: 560px;
      margin: 12px auto 0;
      color: var(--text-soft);
      font-size: 1rem;
      line-height: 1.45;
    }
    .confirmation-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 24px;
      text-align: left;
    }
    .confirmation-item {
      border: 1px solid rgba(18, 37, 62, 0.08);
      border-radius: 18px;
      padding: 18px;
      background: linear-gradient(180deg, #fff 0%, #fbfbfb 100%);
    }
    .confirmation-item span {
      display: block;
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #7b8797;
    }
    .confirmation-item strong {
      display: block;
      margin-top: 8px;
      color: var(--brand-dark);
      font-size: 1.02rem;
      line-height: 1.45;
      word-break: break-word;
    }
    .confirmation-actions {
      margin-top: 26px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .primary-link,
    .secondary-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 240px;
      min-height: 54px;
      padding: 0 28px;
      border-radius: 999px;
      font-weight: 800;
      text-decoration: none;
    }
    .primary-link {
      background: linear-gradient(135deg, #8bc53f, #6ea62a);
      color: #112008;
      box-shadow: 0 16px 32px rgba(139, 197, 63, 0.22);
    }
    .secondary-link {
      border: 1px solid rgba(18, 37, 62, 0.14);
      background: #fff;
      color: var(--brand-dark);
    }
    @media (max-width: 767px) {
      .confirmation-card {
        padding: 28px 18px;
      }
      .confirmation-grid {
        grid-template-columns: 1fr;
      }
      .primary-link,
      .secondary-link {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <header class="site-navbar">
    <div class="container text-center">
      <a href="/examples/car-demo">
        <img src="./assets/logo_white2.png" alt="Rent a Car Medellin">
      </a>
    </div>
  </header>

  <main class="confirmation-shell">
    <section class="confirmation-card">
      <div class="confirmation-badge" aria-hidden="true">
        <svg viewBox="0 0 24 24" focusable="false">
          <path fill="currentColor" d="M12 2 1.5 6v6c0 6 4.26 11.62 10.5 13 6.24-1.38 10.5-7 10.5-13V6L12 2Zm-1.18 15.2-4.24-4.24 1.41-1.41 2.83 2.82 5.19-5.18 1.41 1.41-6.6 6.6Z"></path>
        </svg>
      </div>
      <h1>Reserva confirmada</h1>
      <p class="confirmation-lead">La verificacion llegara al correo y al telefono por SMS.</p>

      <div class="confirmation-grid">
        <article class="confirmation-item">
          <span>Email de verificacion</span>
          <strong id="emailValue">No registrado</strong>
        </article>
        <article class="confirmation-item">
          <span>Telefono para SMS</span>
          <strong id="phoneValue">No registrado</strong>
        </article>
        <article class="confirmation-item">
          <span>Vehiculo</span>
          <strong id="vehicleValue">Vehiculo por confirmar</strong>
        </article>
        <article class="confirmation-item">
          <span>Fechas</span>
          <strong id="dateValue">Fechas por confirmar</strong>
        </article>
      </div>

      <div class="confirmation-actions">
        <a class="primary-link" href="/examples/car-demo">Volver al inicio</a>
        <a class="secondary-link" href="/rentacar/reservar.html">Hacer otra reserva</a>
      </div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);

    function valueOrFallback(value, fallback) {
      return value && value.trim() ? value.trim() : fallback;
    }

    function formatDate(raw) {
      if (!raw) return '';
      const parsed = new Date(raw + 'T12:00:00');
      if (Number.isNaN(parsed.getTime())) return raw;
      return parsed.toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    const email = valueOrFallback(params.get('email'), 'No registrado');
    const phone = valueOrFallback(params.get('phone'), 'No registrado');
    const vehicle = valueOrFallback(params.get('vehicle'), 'Vehiculo por confirmar');
    const start = formatDate(params.get('desde'));
    const end = formatDate(params.get('hasta'));
    const dateLabel = start && end ? start + ' al ' + end : 'Fechas por confirmar';

    document.getElementById('emailValue').textContent = email;
    document.getElementById('phoneValue').textContent = phone;
    document.getElementById('vehicleValue').textContent = vehicle;
    document.getElementById('dateValue').textContent = dateLabel;
  </script>
</body>
</html>
