<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompts de Feedback</title>
  <style>
    :root {
      --bg: #050505;
      --panel: #0f0f10;
      --ink: #f5f5f2;
      --muted: #9ea0a6;
      --line: rgba(255, 255, 255, 0.12);
      --accent: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 30%),
        linear-gradient(180deg, #020202, #090909 55%, #000000);
      color: var(--ink);
      font-family: Georgia, "Times New Roman", serif;
    }
    main {
      width: min(1080px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 56px 0 96px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.2rem, 7vw, 5.4rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
      text-transform: uppercase;
    }
    .intro {
      max-width: 780px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .grid {
      display: grid;
      gap: 18px;
    }
    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--line);
      border-radius: 26px;
      padding: 22px;
      box-shadow: 0 22px 80px rgba(0, 0, 0, 0.34);
    }
    .card h2 {
      margin: 0 0 8px;
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      line-height: 1.1;
    }
    .meta {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    pre {
      margin: 0;
      padding: 18px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--ink);
      white-space: pre-wrap;
      word-break: break-word;
      font-family: "Courier New", monospace;
      line-height: 1.55;
      font-size: 0.95rem;
    }
    .copy-btn,
    .drawer-toggle {
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: transparent;
      color: var(--ink);
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      font: inherit;
    }
    .copy-btn {
      margin-top: 14px;
    }
    .drawer-toggle {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 10;
      backdrop-filter: blur(12px);
      background: rgba(10, 10, 10, 0.88);
    }
    .drawer {
      position: fixed;
      right: 18px;
      bottom: 70px;
      width: min(420px, calc(100vw - 36px));
      max-height: min(68vh, 620px);
      overflow: auto;
      background: rgba(10, 10, 10, 0.96);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
      display: none;
      box-shadow: 0 28px 96px rgba(0, 0, 0, 0.46);
    }
    .drawer[data-open="true"] {
      display: block;
    }
    .drawer h3 {
      margin: 0 0 12px;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .idea {
      padding: 12px 0;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }
    .idea:first-of-type {
      border-top: none;
      padding-top: 0;
    }
    .idea strong {
      display: block;
      margin-bottom: 4px;
    }
    .empty,
    .error {
      color: var(--muted);
      padding: 20px;
      border: 1px dashed rgba(255,255,255,0.16);
      border-radius: 20px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Prompts Listos Para Codex</h1>
    <p class="intro">Cada bloque de abajo corresponde a una mejora concreta detectada en el video. Están redactados para pegarse directamente en Codex sobre el repo actual, conservando el resto del comportamiento salvo donde el cambio lo exija.</p>
    <section class="grid" id="prompt-grid"></section>
  </main>
  <button class="drawer-toggle" id="future-ideas-toggle" type="button">Ideas futuras</button>
  <aside class="drawer" id="future-ideas-drawer" data-open="false">
    <h3>Ideas futuras o ambiguas</h3>
    <div id="future-ideas-content"></div>
  </aside>
  <script src="/video-feedback-prompts.js"></script>
</body>
</html>
